---
- name: Installer Docker sur le nouveau nœud
  hosts: swarm_workers
  become: true
  tasks:
    - name: Installer Docker via le script officiel
      shell: |
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker

- name: Récupérer le token de jointure worker depuis le manager
  hosts: swarm_managers
  become: true
  tasks:
    - name: Obtenir le token
      command: docker swarm join-token worker -q
      register: worker_token
      changed_when: false

- name: Rejoindre le cluster Swarm
  hosts: swarm_workers
  become: true
  vars:
    manager_ip: "10.10.10.11"
    join_token: "{{ hostvars['swarm-manager']['worker_token']['stdout'] }}"
  tasks:
    - name: Vérifier si déjà dans un swarm
      command: docker info -f '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_state
      changed_when: false

    - name: Rejoindre le swarm si pas déjà fait
      command: "docker swarm join --token {{ join_token }} {{ manager_ip }}:2377"
      when: "'active' not in swarm_state.stdout"
