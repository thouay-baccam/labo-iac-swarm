---
- name: Deployer node-exporter sur tous les noeuds du swarm
  hosts: swarm
  become: true
  tasks:
    - name: Lancer node-exporter en conteneur Docker
      community.docker.docker_container:
        name: node-exporter
        image: prom/node-exporter:latest
        state: started
        restart_policy: always
        network_mode: host
        pid_mode: host
        command: "--path.rootfs=/host"
        volumes:
          - "/:/host:ro,rslave"

    - name: Autoriser le scraping Prometheus (port 9100) depuis le manager
      community.general.ufw:
        rule: allow
        port: '9100'
        proto: tcp
        src: 10.10.10.11
        comment: "Scraping Prometheus node-exporter"

    - name: Autoriser aussi depuis le sous-reseau Docker interne (scraping local sur le manager lui-meme)
      community.general.ufw:
        rule: allow
        port: '9100'
        proto: tcp
        src: 172.18.0.0/16
        comment: "Scraping Prometheus via docker_gwbridge (local au manager)"
      when: inventory_hostname in groups['swarm_managers']

- name: Deployer la stack de supervision (Prometheus + Grafana) avec provisioning automatique
  hosts: swarm_managers
  become: true
  tasks:
    - name: Creer les dossiers de provisioning Grafana
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/grafana-provisioning/datasources
        - /opt/grafana-provisioning/dashboards

    - name: Copier le fichier de configuration Prometheus (généré dynamiquement)
      template:
        src: templates/prometheus.yml.j2
        dest: /opt/prometheus.yml
      notify: Recharger Prometheus

    - name: Provisionner automatiquement la source de donnees Prometheus dans Grafana
      copy:
        dest: /opt/grafana-provisioning/datasources/datasource.yml
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus:9090
              isDefault: true
              editable: true

    - name: Configurer le fournisseur de dashboards Grafana
      copy:
        dest: /opt/grafana-provisioning/dashboards/dashboard.yml
        content: |
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              updateIntervalSeconds: 30
              options:
                path: /etc/grafana/provisioning/dashboards

    - name: Telecharger le dashboard Node Exporter Full (ID 1860) automatiquement
      get_url:
        url: https://grafana.com/api/dashboards/1860/revisions/latest/download
        dest: /opt/grafana-provisioning/dashboards/node-exporter-full.json
        mode: '0644'

    - name: Copier le fichier docker-compose de la stack monitoring
      copy:
        dest: /opt/monitoring-stack.yml
        content: |
          version: "3.8"
          services:
            prometheus:
              image: prom/prometheus:latest
              ports:
                - "9090:9090"
              volumes:
                - /opt/prometheus.yml:/etc/prometheus/prometheus.yml
              deploy:
                placement:
                  constraints: [node.role == manager]
            grafana:
              image: grafana/grafana:latest
              ports:
                - "3000:3000"
              environment:
                - GF_SECURITY_ADMIN_PASSWORD=admin
              volumes:
                - grafana_data:/var/lib/grafana
                - /opt/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
                - /opt/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards
              deploy:
                placement:
                  constraints: [node.role == manager]
          volumes:
            grafana_data:

    - name: Installer pip3 sur le manager
      apt:
        name: python3-pip
        state: present
        update_cache: true

    - name: Installer jsondiff (requis par le module docker_stack)
      ansible.builtin.pip:
        name: jsondiff
        extra_args: "--break-system-packages"

    - name: Deployer la stack via docker stack deploy
      community.docker.docker_stack:
        name: monitoring
        compose:
          - /opt/monitoring-stack.yml
        state: present

  handlers:
    - name: Recharger Prometheus
      command: docker service update --force monitoring_prometheus
